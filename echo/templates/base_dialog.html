<script>
function getCookie(name) {
    let cookieValue = null;
    if (document.cookie && document.cookie !== '') {
        const cookies = document.cookie.split(';');
        for (let i = 0; i < cookies.length; i++) {
            const cookie = cookies[i].trim();
            if (cookie.substring(0, name.length + 1) === (name + '=')) {
                cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                break;
            }
        }
    }
    return cookieValue;
}

<script>
    // Dark mode apply
    (function(){
        var html = document.documentElement;
        var btn = document.getElementById('dark-mode-toggle');
        function applyTheme(dark){
            html[dark?'setAttribute':'removeAttribute']('data-hp-theme','dark');
            html[dark?'setAttribute':'removeAttribute']('data-theme','dark');
            var moon = btn && btn.querySelector('.dm-icon-moon');
            var sun  = btn && btn.querySelector('.dm-icon-sun');
            if(moon) moon.hidden = dark;
            if(sun)  sun.hidden  = !dark;
        }
        applyTheme(localStorage.getItem('hp-dark')==='1');
        if(btn) btn.addEventListener('click',function(){
            var dark = html.getAttribute('data-hp-theme')!=='dark';
            localStorage.setItem('hp-dark', dark?'1':'0');
            applyTheme(dark);
        });
    })();
</script>
