{% extends "base_dialog.html" %}
{% load i18n %}
{% load static %}

{% block content %}
    <div class="p-4 mr-1">
        <div class="mb-0 d-flex">
            <div><a href="/devices/ajouter"
                    class="btn btn-light-primary btn-sm font-weight-bolder mr-2">
                <i class="ki ki-plus icon-sm"></i>
                {% trans "Ajouter un matériel" %}
            </a></div>
            <div class="w-300px">
                <input type="text" class="form-control datatable-input form-control-sm"
                       placeholder="{% trans 'Recherche matériel' %}" data-col-index="0"/>
            </div>
        </div>
        <table class="table table-bordered table-checkable table-striped" id="datatable_rdv">
            <thead>
            <tr>
                <th>{% trans "Marque" %}</th>
                <th>{% trans "Modèle" %}</th>
                <th>{% trans "Actions" %}</th>
            </tr>
            </thead>
        </table>
    </div>

    <template id="actions-template">
        <a href="devices/<%- id %>/modifier" class="btn btn-warning btn-icon btn-sm" title="{% trans 'Modifier' %}">
            <i class="la la-edit icon-lg"></i>
        </a>
        <a onclick="supprimer(<%- id %>)" class="btn btn-danger btn-icon btn-sm" title="{% trans 'Supprimer' %}">
            <i class="la la-trash icon-lg"></i>
        </a>
    </template>
{% endblock %}

{% block scripts %}
    <script type="text/javascript">
        const devices = {{  devices_json|safe }};
        console.log(devices)
    </script>
    <script src="{% static "plugins/custom/datatables/datatables.bundle.js" %}"></script>
    <script src="{% static "js/core/device_list.js" %}"></script>
{% endblock %}
